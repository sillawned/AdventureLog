services:
  web:
    #build: ./frontend/
    image: ghcr.io/seanmorley15/adventurelog-frontend:${FRONTEND_VERSION:-v0.12.0}
    container_name: adventurelog-frontend
    restart: unless-stopped
    env_file: .env
    ports:
      - "${FRONTEND_PORT:-8015}:3000"
    depends_on:
      server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  db:
    image: postgis/postgis:16-3.5
    container_name: adventurelog-db
    restart: unless-stopped
    env_file: .env
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-adventurelog} -d ${POSTGRES_DB:-adventurelog}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  server:
    #build: ./backend/
    image: ghcr.io/seanmorley15/adventurelog-backend:${BACKEND_VERSION:-v0.12.0}
    container_name: adventurelog-backend
    restart: unless-stopped
    env_file: .env
    ports:
      - "${BACKEND_PORT:-8016}:80"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - adventurelog_media:/code/media/
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/health/" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  postgres_data:
  adventurelog_media:
