version: "3.9"

# ⚠️ IMPORTANT: Before running this compose file, you MUST:
# 1. Set all environment variables with ${PLACEHOLDER} values
# 2. Copy this file to docker-compose-traefik.yml and update the values
# 3. Never commit actual secrets or domains to version control
#
# See .env.traefik.example for required environment variables

services:
  traefik:
    image: traefik:v2.11
    command:
      - "--api.insecure=true" # ⚠️ MUST be set to false in production
      - "--providers.docker=true"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web"
      - "--certificatesresolvers.letsencrypt.acme.email=${LETSENCRYPT_EMAIL}" # Required: Your email for Let's Encrypt
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
      - "traefik-letsencrypt:/letsencrypt"
    labels:
      - "traefik.enable=true"
    healthcheck:
      test: ["CMD", "traefik", "healthcheck", "--ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  db:
    image: postgis/postgis:16-3.5
    restart: unless-stopped
    env_file: .env.traefik
    volumes:
      - postgres-data:/var/lib/postgresql/data/
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  web:
    image: ghcr.io/seanmorley15/adventurelog-frontend:${FRONTEND_VERSION:-v0.12.0}
    restart: unless-stopped
    env_file: .env.traefik
    environment:
      PUBLIC_SERVER_URL: "https://${DOMAIN}/api"
      BODY_SIZE_LIMIT: "100000"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.adventurelogweb.entrypoints=websecure"
      - "traefik.http.routers.adventurelogweb.rule=Host(`${DOMAIN}`) && !(PathPrefix(`/media`) || PathPrefix(`/admin`) || PathPrefix(`/static`) || PathPrefix(`/accounts`))"
      - "traefik.http.routers.adventurelogweb.tls=true"
      - "traefik.http.routers.adventurelogweb.tls.certresolver=letsencrypt"
    depends_on:
      server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  server:
    image: ghcr.io/seanmorley15/adventurelog-backend:${BACKEND_VERSION:-v0.12.0}
    restart: unless-stopped
    env_file: .env.traefik
    environment:
      PGHOST: "db"
      PUBLIC_URL: "https://${DOMAIN}"
      CSRF_TRUSTED_ORIGINS: "https://${DOMAIN}"
      DEBUG: "false"
      FRONTEND_URL: "https://${DOMAIN}"
    volumes:
      - adventurelog-media:/code/media
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.adventurelogserver.entrypoints=websecure"
      - "traefik.http.routers.adventurelogserver.rule=Host(`${DOMAIN}`) && (PathPrefix(`/media`) || PathPrefix(`/admin`) || PathPrefix(`/static`) || PathPrefix(`/accounts`))"
      - "traefik.http.routers.adventurelogserver.tls=true"
      - "traefik.http.routers.adventurelogserver.tls.certresolver=letsencrypt"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/health/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  postgres-data:
  adventurelog-media:
  traefik-letsencrypt:
