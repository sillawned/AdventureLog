<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alpine.js Error Test</title>
    <style>
        [x-cloak] { display: none !important; }
        body { font-family: sans-serif; padding: 20px; }
        .error-log { 
            background: #fee; 
            border: 1px solid #fcc; 
            padding: 10px; 
            margin: 10px 0; 
            white-space: pre-wrap;
            font-family: monospace;
            font-size: 12px;
        }
    </style>
    <script>
        // Capture console errors
        window.errors = [];
        const originalError = console.error;
        console.error = function(...args) {
            window.errors.push(args.join(' '));
            originalError.apply(console, args);
        };
        
        const originalWarn = console.warn;
        console.warn = function(...args) {
            window.errors.push('[WARN] ' + args.join(' '));
            originalWarn.apply(console, args);
        };
    </script>
</head>
<body>
    <h1>Alpine.js Error Diagnosis</h1>
    <div id="error-count" style="padding: 10px; background: #ffc; border: 1px solid #cc9; margin: 10px 0;">
        Loading Alpine.js...
    </div>
    
    <iframe src="http://localhost:8080/index.html" 
            style="width: 100%; height: 400px; border: 2px solid #999; margin: 20px 0;">
    </iframe>
    
    <h2>Console Errors/Warnings:</h2>
    <div id="errors"></div>
    
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3/dist/cdn.min.js"></script>
    <script>
        // Display errors after a delay
        setTimeout(() => {
            const errorCount = document.getElementById('error-count');
            const errorsDiv = document.getElementById('errors');
            
            errorCount.textContent = `Total errors/warnings captured: ${window.errors.length}`;
            errorCount.style.background = window.errors.length > 0 ? '#fcc' : '#cfc';
            
            if (window.errors.length === 0) {
                errorsDiv.innerHTML = '<div style="color: green;">✓ No errors detected!</div>';
            } else {
                // Group similar errors
                const errorGroups = {};
                window.errors.forEach(err => {
                    // Extract the key part of the error
                    const key = err.replace(/\d+/g, 'N').substring(0, 100);
                    if (!errorGroups[key]) {
                        errorGroups[key] = { count: 0, example: err };
                    }
                    errorGroups[key].count++;
                });
                
                Object.values(errorGroups).forEach(group => {
                    const div = document.createElement('div');
                    div.className = 'error-log';
                    div.textContent = `[${group.count}x] ${group.example}`;
                    errorsDiv.appendChild(div);
                });
            }
        }, 3000);
    </script>
</body>
</html>
