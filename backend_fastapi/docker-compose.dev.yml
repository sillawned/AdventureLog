version: '3.9'
services:
  fastapi:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/adventurelog
    depends_on:
      - db

  db:
    image: postgis/postgis:16-3.5
    environment:
      POSTGRES_DB: adventurelog
      POSTGRES_USER: adventure
      POSTGRES_PASSWORD: changeme123
    ports:
      - "5432:5432"
