<!-- Register View -->
            <div x-show="currentView === 'register'" style="max-width: 400px; margin: 2rem auto;">
                <div class="card">
                    <h2 style="margin-bottom: 1.5rem;">Create Account</h2>
                    <form @submit.prevent="register()">
                        <div class="form-group">
                            <label>Username</label>
                            <input type="text" x-model="registerForm.username" required minlength="3">
                        </div>
                        <div class="form-group">
                            <label>Email</label>
                            <input type="email" x-model="registerForm.email" required>
                        </div>
                        <div class="form-group">
                            <label>Password</label>
                            <input type="password" x-model="registerForm.password" required minlength="8">
                        </div>
                        <button type="submit" class="btn btn-primary" style="width: 100%;" :disabled="loading">
                            <span x-show="!loading">Register</span>
                            <span x-show="loading">Loading...</span>
                        </button>
                    </form>
                </div>
            </div>
