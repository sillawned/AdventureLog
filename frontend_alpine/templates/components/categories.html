<!-- Categories View -->
<div x-show="currentView === 'categories'" class="container mt-4">
    <div class="flex justify-between items-center mb-4">
        <h2>Categories</h2>
        <button @click="showAddCategory = !showAddCategory" class="btn btn-primary">
            <span x-text="showAddCategory ? 'Cancel' : '+ Add Category'"></span>
        </button>
    </div>
    
    <!-- Add Category Form -->
    <div x-show="showAddCategory" class="card mb-4">
        <form @submit.prevent="createCategory()">
            <div class="form-group">
                <label>Name*</label>
                <input type="text" x-model="categoryForm.name" required>
            </div>
            <div class="form-group">
                <label>Icon (optional)</label>
                <input type="text" x-model="categoryForm.icon" placeholder="🏔️">
                <small class="text-light">Enter an emoji or icon character</small>
            </div>
            <div class="form-group">
                <label>
                    <input type="checkbox" x-model="categoryForm.is_public">
                    Make public
                </label>
            </div>
            <button type="submit" class="btn btn-primary">Create Category</button>
        </form>
    </div>

    <!-- Edit Category Modal -->
    <div x-show="showEditCategory" class="modal-overlay" @click.self="showEditCategory = false; editingCategoryId = null">
        <div class="modal-content" @click.stop>
            <div class="modal-header">
                <h3>Edit Category</h3>
                <button @click="showEditCategory = false; editingCategoryId = null" class="btn-close">×</button>
            </div>
            <form @submit.prevent="updateCategory()">
                <div class="form-group">
                    <label>Name*</label>
                    <input type="text" x-model="categoryForm.name" required>
                </div>
                <div class="form-group">
                    <label>Icon (optional)</label>
                    <input type="text" x-model="categoryForm.icon" placeholder="🏔️">
                    <small class="text-light">Enter an emoji or icon character</small>
                </div>
                <div class="form-group">
                    <label>
                        <input type="checkbox" x-model="categoryForm.is_public">
                        Make public
                    </label>
                </div>
                <div class="modal-actions">
                    <button type="button" @click="showEditCategory = false; editingCategoryId = null" class="btn btn-secondary">Cancel</button>
                    <button type="submit" class="btn btn-primary">Update Category</button>
                </div>
            </form>
        </div>
    </div>
    
    <!-- Search Bar -->
    <div x-show="!showAddCategory && categories.length > 0" class="card mb-4">
        <div class="form-group" style="margin-bottom: 0;">
            <input 
                type="text" 
                x-model="categoriesSearchQuery" 
                placeholder="🔍 Search categories by name or icon..."
                class="w-full"
            >
        </div>
        <p x-show="categoriesSearchQuery" class="text-sm text-muted mt-2">
            Showing <strong x-text="filteredCategories.length"></strong> of <strong x-text="categories.length"></strong> categories
        </p>
    </div>
    
    <!-- Categories Grid -->
    <div class="grid grid-3 gap-4">
        <template x-for="category in filteredCategories" :key="category.id">
            <category-card
                x-bind:name="category.name"
                x-bind:icon="category.icon || '📁'"
                x-bind:ispublic="String(!!category.is_public)"
                showactions="true"
                x-init="$el.addEventListener('delete', () => deleteCategory(category.id))"
                @dblclick="openEditCategory(category)"
                style="cursor: pointer;"
            ></category-card>
        </template>
        
        <template x-if="filteredCategories.length === 0 && categories.length > 0">
            <div class="card text-center" style="grid-column: 1 / -1;">
                <p class="text-light">No categories match your search.</p>
            </div>
        </template>
        
        <template x-if="categories.length === 0 && !showAddCategory">
            <div class="card text-center" style="grid-column: 1 / -1;">
                <p class="text-light">No categories yet. Create your first one!</p>
            </div>
        </template>
    </div>
</div>
