                                            <option value="4">⭐⭐⭐⭐ 4</option>
                                            <option value="5">⭐⭐⭐⭐⭐ 5</option>
                                        </select>
                                    </div>
                                    <div class="form-group">
                                        <div class="checkbox-group">
                                            <input type="checkbox" x-model="transportationForm.is_public" id="transport-public-edit">
                                            <label for="transport-public-edit">Make public</label>
                                        </div>
                                    </div>
                                    <div class="modal-actions">
                                        <button type="button" @click="showEditTransportation = false; editingTransportationId = null" class="btn btn-secondary">Cancel</button>
                                        <button type="submit" class="btn btn-primary">Update Transportation</button>
                                    </div>
                                </form>
                            </div>
                        </div>

                        <template x-for="transport in locationTransportation" :key="transport.id">
                            <transportation-card
                                x-bind:type="transport.type || ''"
                                x-bind:fromlocation="transport.from_location || ''"
                                x-bind:tolocation="transport.to_location || ''"
                                x-bind:departtime="transport.depart_time || ''"
                                x-bind:arrivetime="transport.arrive_time || ''"
                                x-bind:departtimezone="transport.depart_timezone || ''"
                                x-bind:arrivetimezone="transport.arrive_timezone || ''"
                                x-bind:link="transport.link || ''"
                                x-bind:rating="String(transport.rating || 0)"
                                showactions="true"
                                x-init="$el.addEventListener('delete', () => deleteTransportation(transport.id))"
                                @dblclick="openEditTransportation(transport)"
                                style="cursor: pointer;"
                            ></transportation-card>
                        </template>
                        <p x-show="locationTransportation.length === 0" class="text-muted">No transportation records yet.</p>
                    </div>

                    <!-- Lodging Tab -->
                    <div x-show="locationTab === 'lodging'">
                        <div class="flex justify-between items-center mb-4">
                            <h3>Lodging</h3>
                            <button @click="showAddLodging = !showAddLodging" class="btn btn-sm btn-primary">
                                <span x-show="!showAddLodging">+ Add Lodging</span>
                                <span x-show="showAddLodging">Cancel</span>
                            </button>
                        </div>
                        
                        <div x-show="showAddLodging" class="card">
                            <form @submit.prevent="createLodging()">
                                <div class="form-group">
                                    <label>Name</label>
                                    <input type="text" x-model="lodgingForm.name" placeholder="Hotel name, Airbnb, etc." required>
                                </div>
                                <button type="submit" class="btn btn-primary">Add Lodging</button>
                            </form>
                        </div>

                        <template x-for="lodging in locationLodging" :key="lodging.id">
                            <div class="card" @dblclick="openEditLodging(lodging)" style="cursor: pointer;">
                                <div class="flex justify-between items-start">
                                    <h4 x-text="lodging.name"></h4>
                                    <button @click="deleteLodging(lodging.id)" class="btn btn-sm btn-danger">Delete</button>
                                </div>
                            </div>
                        </template>
                        <p x-show="locationLodging.length === 0" class="text-muted">No lodging information yet.</p>
                    </div>

                    <!-- Trails Tab -->
                    <div x-show="locationTab === 'trails'">
                        <div class="flex justify-between items-center mb-4">
                            <h3>Trails</h3>
                            <button @click="showAddTrail = !showAddTrail" class="btn btn-sm btn-primary">
                                <span x-show="!showAddTrail">+ Add Trail</span>
                                <span x-show="showAddTrail">Cancel</span>
                            </button>
                        </div>
                        
                        <div x-show="showAddTrail" class="card">
                            <form @submit.prevent="createTrail()">
                                <div class="form-group">
                                    <label>Trail Name</label>
                                    <input type="text" x-model="trailForm.name" required>
                                </div>
                                <div class="form-group">
                                    <label>Difficulty</label>
                                    <select x-model="trailForm.difficulty">
                                        <option value="">Select difficulty</option>
                                        <option value="easy">🟢 Easy</option>
                                        <option value="moderate">🟡 Moderate</option>
                                        <option value="hard">🔴 Hard</option>
                                    </select>
                                </div>
                                <div class="form-group">
                                    <label>Length (km)</label>
                                    <input type="number" step="0.1" x-model="trailForm.length">
                                </div>
                                <button type="submit" class="btn btn-primary">Add Trail</button>
                            </form>
                        </div>

                        <template x-for="trail in locationTrails" :key="trail.id">
                            <div class="card" @dblclick="openEditTrail(trail)" style="cursor: pointer;">
                                <div class="flex justify-between items-start">
                                    <div>
                                        <h4 x-text="trail.name"></h4>
                                        <div class="flex gap-2" style="margin-top: 0.5rem;">
                                            <span x-show="trail.difficulty" class="badge" :class="{
                                                'badge-green': trail.difficulty === 'easy',
                                                'badge-yellow': trail.difficulty === 'moderate',
                                                'badge-red': trail.difficulty === 'hard'
                                            }" x-text="trail.difficulty"></span>
                                            <span x-show="trail.length" class="text-sm text-muted" x-text="trail.length + ' km'"></span>
                                        </div>
                                    </div>
                                    <button @click="deleteTrail(trail.id)" class="btn btn-sm btn-danger">Delete</button>
                                </div>
                            </div>
                        </template>
                        <p x-show="locationTrails.length === 0" class="text-muted">No trails recorded yet.</p>
                    </div>
                </div>
            </div>
