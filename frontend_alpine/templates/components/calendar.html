<!-- Calendar View -->
<div x-show="currentView === 'calendar'" x-transition class="min-h-screen bg-gradient-to-br from-base-200 via-base-100 to-base-200">
    <!-- Header -->
    <div class="sticky top-0 z-40 bg-base-100/80 backdrop-blur-lg border-b border-base-300">
        <div class="container mx-auto px-6 py-4">
            <div class="flex items-center justify-between">
                <div class="flex items-center gap-4">
                    <div class="flex items-center gap-3">
                        <div class="p-2 bg-primary/10 rounded-xl">
                            <svg xmlns="http://www.w3.org/2000/svg" class="w-8 h-8 text-primary" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
                            </svg>
                        </div>
                        <div>
                            <h1 class="text-3xl font-bold text-primary bg-clip-text">Visit Calendar</h1>
                            <p class="text-sm text-base-content/60" x-text="(calendarEvents?.length || 0) + ' events scheduled'"></p>
                        </div>
                    </div>
                </div>

                <!-- Quick Stats -->
                <div class="hidden md:flex items-center gap-2">
                    <div class="stats stats-horizontal bg-base-200/50 border border-base-300/50">
                        <div class="stat py-2 px-4">
                            <div class="stat-title text-xs">Total Events</div>
                            <div class="stat-value text-lg text-primary" x-text="calendarEvents?.length || 0"></div>
                        </div>
                        <div class="stat py-2 px-4">
                            <div class="stat-title text-xs">Locations</div>
                            <div class="stat-value text-lg text-secondary" x-text="locations?.length || 0"></div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Search Bar -->
            <div class="mt-4 flex items-center gap-4">
                <div class="relative flex-1 max-w-md">
                    <svg xmlns="http://www.w3.org/2000/svg" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-base-content/40" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                    </svg>
                    <input
                        type="text"
                        placeholder="Search for location..."
                        class="input input-bordered w-full pl-10 pr-10 bg-base-100/80"
                        x-model="calendarSearchFilter"
                    />
                    <button 
                        x-show="calendarSearchFilter.length > 0"
                        @click="calendarSearchFilter = ''"
                        class="absolute right-3 top-1/2 -translate-y-1/2 text-base-content/40 hover:text-base-content"
                    >
                        <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                        </svg>
                    </button>
                </div>

                <!-- Download ICS Button -->
                <button @click="downloadICS()" class="btn btn-primary gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" />
                    </svg>
                    Download Calendar
                </button>
            </div>

            <!-- Filter Chips -->
            <div x-show="calendarSearchFilter" class="mt-4 flex flex-wrap items-center gap-2">
                <span class="text-sm font-medium text-base-content/60">Filter by:</span>
                <button class="btn btn-ghost btn-xs gap-1" @click="calendarSearchFilter = ''">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                    </svg>
                    Clear All
                </button>
            </div>
        </div>
    </div>

    <!-- Main Content -->
    <div class="container mx-auto px-6 py-8">
        <!-- Calendar Container -->
        <div class="card bg-base-100 shadow-2xl border border-base-300/50">
            <div class="card-body p-6">
                <!-- Calendar Header -->
                <div class="flex items-center justify-between mb-6">
                    <div class="flex items-center gap-4">
                        <button @click="previousMonth()" class="btn btn-ghost btn-sm">
                            <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
                            </svg>
                        </button>
                        <h2 class="text-2xl font-bold" x-text="currentMonthYear"></h2>
                        <button @click="nextMonth()" class="btn btn-ghost btn-sm">
                            <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" />
                            </svg>
                        </button>
                        <button @click="goToToday()" class="btn btn-outline btn-sm">Today</button>
                    </div>
                    <div class="flex gap-2">
                        <button @click="calendarView = 'month'" class="btn btn-sm" :class="calendarView === 'month' ? 'btn-primary' : 'btn-ghost'">Month</button>
                        <button @click="calendarView = 'list'" class="btn btn-sm" :class="calendarView === 'list' ? 'btn-primary' : 'btn-ghost'">List</button>
                    </div>
                </div>

                <!-- Month View -->
                <div x-show="calendarView === 'month'" class="calendar-grid">
                    <!-- Day Headers -->
                    <template x-for="day in ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat']" :key="day">
                        <div class="calendar-day-header" x-text="day"></div>
                    </template>
                    
                    <!-- Calendar Days -->
                    <template x-for="day in calendarDays" :key="day.date">
                        <div class="calendar-day" :class="{'calendar-day-today': day.isToday, 'calendar-day-other-month': !day.isCurrentMonth}">
                            <div class="calendar-day-number" x-text="day.dayNumber"></div>
                            <div class="calendar-day-events">
                                <template x-for="event in day.events?.slice(0, 3)" :key="event.id">
                                    <div class="calendar-event" @click="viewEventDetail(event)" :style="`background-color: ${event.color || 'var(--primary)'}`">
                                        <span class="text-xs truncate" x-text="event.title"></span>
                                    </div>
                                </template>
                                <div x-show="day.events?.length > 3" class="text-xs text-base-content/60 text-center mt-1" x-text="`+${day.events.length - 3} more`"></div>
                            </div>
                        </div>
                    </template>
                </div>

                <!-- List View -->
                <div x-show="calendarView === 'list'" class="space-y-4">
                    <template x-for="event in filteredCalendarEvents" :key="event.id">
                        <div class="card bg-base-200/50 hover:bg-base-200 cursor-pointer transition-colors" @click="viewEventDetail(event)">
                            <div class="card-body p-4">
                                <div class="flex items-start justify-between gap-4">
                                    <div class="flex items-center gap-3">
                                        <div class="p-2 bg-primary/10 rounded-lg">
                                            <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 text-primary" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
                                            </svg>
                                        </div>
                                        <div>
                                            <h3 class="font-bold" x-text="event.title"></h3>
                                            <p class="text-sm text-base-content/70" x-text="formatEventDate(event.start)"></p>
                                            <p x-show="event.location" class="text-sm text-base-content/60 flex items-center gap-1 mt-1">
                                                <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z" />
                                                </svg>
                                                <span x-text="event.location"></span>
                                            </p>
                                        </div>
                                    </div>
                                    <div x-show="event.category" class="badge badge-primary" x-text="event.category"></div>
                                </div>
                            </div>
                        </div>
                    </template>

                    <div x-show="!filteredCalendarEvents || filteredCalendarEvents.length === 0" class="text-center py-12">
                        <div class="p-6 bg-base-200/50 rounded-2xl w-fit mx-auto mb-4">
                            <svg xmlns="http://www.w3.org/2000/svg" class="w-12 h-12 text-base-content/30" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
                            </svg>
                        </div>
                        <h3 class="text-lg font-semibold text-base-content/70">No events found</h3>
                        <p class="text-base-content/50">Try adjusting your filters</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Event Detail Modal -->
<div x-show="selectedCalendarEvent" x-transition class="modal modal-open" @click.self="selectedCalendarEvent = null">
    <div class="modal-box max-w-2xl bg-base-100 border border-base-300/50 shadow-2xl">
        <div class="flex items-start justify-between mb-6">
            <div class="flex items-center gap-4">
                <div class="p-3 bg-primary/10 rounded-xl">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6 text-primary" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
                    </svg>
                </div>
                <div>
                    <h3 class="text-2xl font-bold" x-text="selectedCalendarEvent?.title"></h3>
                    <div x-show="selectedCalendarEvent?.category" class="badge badge-primary badge-lg mt-2" x-text="selectedCalendarEvent?.category"></div>
                </div>
            </div>
            <button class="btn btn-ghost btn-sm btn-circle" @click="selectedCalendarEvent = null">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                </svg>
            </button>
        </div>

        <div class="space-y-4">
            <!-- Date & Time -->
            <div class="card bg-base-200/50 border border-base-300/30">
                <div class="card-body p-4">
                    <div class="flex items-center gap-3">
                        <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6 text-primary flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
                        </svg>
                        <div>
                            <div class="font-semibold text-lg" x-text="formatEventDate(selectedCalendarEvent?.start)"></div>
                            <div x-show="selectedCalendarEvent?.end" class="text-sm text-base-content/70 mt-1" x-text="'Until: ' + formatEventDate(selectedCalendarEvent?.end)"></div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Location -->
            <div x-show="selectedCalendarEvent?.location" class="card bg-base-200/50 border border-base-300/30">
                <div class="card-body p-4">
                    <div class="flex items-center gap-3">
                        <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6 text-primary flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z" />
                        </svg>
                        <div class="font-semibold text-lg" x-text="selectedCalendarEvent?.location"></div>
                    </div>
                </div>
            </div>

            <!-- Description -->
            <div x-show="selectedCalendarEvent?.description" class="card bg-base-200/50 border border-base-300/30">
                <div class="card-body p-4">
                    <div class="font-semibold text-lg mb-3">Description</div>
                    <div class="prose max-w-full" x-html="selectedCalendarEvent?.description"></div>
                </div>
            </div>

            <button x-show="selectedCalendarEvent?.locationId" @click="viewLocation(selectedCalendarEvent?.locationId)" class="btn btn-neutral btn-block mt-4">
                View Details
            </button>
        </div>

        <div class="modal-action mt-8">
            <button class="btn btn-primary btn-lg" @click="selectedCalendarEvent = null">Close</button>
        </div>
    </div>
</div>
