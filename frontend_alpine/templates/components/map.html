<!-- Map View -->
<div x-show="currentView === 'map'" x-transition class="min-h-screen bg-gradient-to-br from-base-200 via-base-100 to-base-200">
    <!-- Header -->
    <div class="sticky top-0 z-40 bg-base-100/80 backdrop-blur-lg border-b border-base-300">
        <div class="container mx-auto px-6 py-4">
            <div class="flex items-center justify-between">
                <div class="flex items-center gap-4">
                    <div class="flex items-center gap-3">
                        <div class="p-2 bg-primary/10 rounded-xl">
                            <svg xmlns="http://www.w3.org/2000/svg" class="w-8 h-8 text-primary" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 20l-5.447-2.724A1 1 0 013 16.382V5.618a1 1 0 011.447-.894L9 7m0 13l6-3m-6 3V7m6 10l4.553 2.276A1 1 0 0021 18.382V7.618a1 1 0 00-.553-.894L15 4m0 13V4m0 0L9 7" />
                            </svg>
                        </div>
                        <div>
                            <h1 class="text-3xl font-bold text-primary">Location Map</h1>
                            <p class="text-sm text-base-content/60" x-text="`${filteredLocations.length} of ${locations.length} locations shown`"></p>
                        </div>
                    </div>
                </div>

                <!-- Quick Stats -->
                <div class="hidden md:flex items-center gap-2">
                    <div class="stats stats-horizontal bg-base-200/50 border border-base-300/50">
                        <div class="stat py-2 px-4">
                            <div class="stat-title text-xs">Visited</div>
                            <div class="stat-value text-lg text-success" x-text="locations.filter(l => l.is_visited).length"></div>
                        </div>
                        <div class="stat py-2 px-4">
                            <div class="stat-title text-xs">Planned</div>
                            <div class="stat-value text-lg text-info" x-text="locations.filter(l => !l.is_visited).length"></div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Controls -->
            <div class="mt-4 flex flex-wrap items-center gap-4">
                <div class="form-control">
                    <label class="label cursor-pointer gap-2">
                        <input type="checkbox" x-model="mapShowVisited" class="checkbox checkbox-success checkbox-sm" />
                        <span class="label-text">Show Visited</span>
                    </label>
                </div>
                <div class="form-control">
                    <label class="label cursor-pointer gap-2">
                        <input type="checkbox" x-model="mapShowPlanned" class="checkbox checkbox-info checkbox-sm" />
                        <span class="label-text">Show Planned</span>
                    </label>
                </div>
                <button class="btn btn-primary btn-sm gap-2" @click="openNewLocationModal()">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
                    </svg>
                    Add Location
                </button>
            </div>
        </div>
    </div>

    <!-- Map Container -->
    <div class="container mx-auto px-6 py-4">
        <div class="card bg-base-100 shadow-xl">
            <div class="card-body p-0">
                <div id="locations-map" class="w-full h-[70vh] rounded-lg"></div>
            </div>
        </div>
    </div>
</div>
